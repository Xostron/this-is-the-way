<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Тест</title>
		<style>
			button {
				background-color: rgb(96, 161, 226);
			}
		</style>
		<script src="./index.js"></script>
		<script>
			const data = {
				controller: new AbortController(),
				// Сигнал для нативных функции, которые работают с флагом (setTimeout, fetch etc )
				get signal() {
					return this.controller.signal
				},
				// Сигнал на прерывание
				abort() {
					this.controller.abort()
				},
				// Проверка: произошло прерывание
				check() {
					return this.controller.signal.aborted
				},
				// Обновление контроллера после срабатывания
				refresh() {
					if (this.check) this.controller = new AbortController()
				},
			}

			loop()
			//
			async function loop() {
				while (1) {
					console.log('loop begin', data.check())
					if (data.check()) {
						console.log(12)
						data.refresh()
						continue
					}
					await act(2000)
					console.log(1, hms())
					await act(2000)
					console.log(2, hms())
					await act(2000)
					console.log(3, hms())
				}
			}
			//
			async function act(t) {
				if (data.check()) return
				await pause(t)
			}
			//
			function pause(t = 0) {
				return new Promise((r) => {
					setTimeout(r, t, { signal: data.signal })
				})
			}
			function hms() {
				return new Date().toLocaleString('ru', {
					hour: 'numeric',
					minute: 'numeric',
					second: 'numeric',
				})
			}
		</script>
	</head>
	<body>
		<style>
			#stp {
				border: none;
			}
		</style>
		<button id="stp">Stop</button>
		<script>
			stp.addEventListener('click', (_) => {
				console.log('stop')
				data.abort()
			})
		</script>
	</body>
</html>
